<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'DM Sans','Manrope',sans-serif">
  <title>The Ovify Ecosystem</title>
  <desc>One AI core connecting the clinic, the patient, and the support network in a continuous real-time sync loop.</desc>

  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#15233b"/>
      <stop offset="100%" stop-color="#0B1422"/>
    </radialGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8B4FF"/>
      <stop offset="100%" stop-color="#5D5FEF"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B8A4FF"/>
      <stop offset="100%" stop-color="#8BD4FF"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="1000" height="700" fill="url(#bg)"/>
  <circle cx="820" cy="150" r="150" fill="#B8A4FF" opacity="0.10" filter="url(#soft)"/>
  <circle cx="160" cy="560" r="150" fill="#8BD4FF" opacity="0.08" filter="url(#soft)"/>
  <circle cx="500" cy="400" r="120" fill="#F5C6CF" opacity="0.06" filter="url(#soft)"/>

  <text x="500" y="52" text-anchor="middle" fill="#B8A4FF" font-family="Inter,sans-serif" font-size="16" font-weight="600" letter-spacing="4">AI INFRASTRUCTURE FOR IVF CLINICS</text>
  <text x="500" y="94" text-anchor="middle" fill="#F4F6FB" font-size="40" font-weight="700" letter-spacing="-0.5">The Connected Care Ecosystem</text>

  <g stroke="url(#flow)" stroke-width="2.5" fill="none" opacity="0.55" stroke-linecap="round">
    <line x1="500" y1="318" x2="500" y2="258" stroke-dasharray="7 9"><animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.1s" repeatCount="indefinite"/></line>
    <line x1="436" y1="452" x2="318" y2="488" stroke-dasharray="7 9"><animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.1s" repeatCount="indefinite"/></line>
    <line x1="564" y1="452" x2="682" y2="488" stroke-dasharray="7 9"><animate attributeName="stroke-dashoffset" from="32" to="0" dur="1.1s" repeatCount="indefinite"/></line>
  </g>

  <g fill="none" stroke="#8BD4FF" stroke-width="2" opacity="0.45">
    <path d="M444,228 Q300,330 286,452" stroke-dasharray="2 10" stroke-linecap="round"><animate attributeName="stroke-dashoffset" from="0" to="-24" dur="1.4s" repeatCount="indefinite"/></path>
    <path d="M320,548 Q500,610 680,548" stroke-dasharray="2 10" stroke-linecap="round"><animate attributeName="stroke-dashoffset" from="0" to="-24" dur="1.4s" repeatCount="indefinite"/></path>
    <path d="M714,452 Q700,330 556,228" stroke-dasharray="2 10" stroke-linecap="round"><animate attributeName="stroke-dashoffset" from="0" to="-24" dur="1.4s" repeatCount="indefinite"/></path>
  </g>

  <text x="316" y="360" text-anchor="middle" fill="#9FB0C8" font-family="Inter,sans-serif" font-size="14" transform="rotate(58 316 360)">protocol synced</text>
  <text x="500" y="600" text-anchor="middle" fill="#9FB0C8" font-family="Inter,sans-serif" font-size="14">support cues</text>
  <text x="692" y="360" text-anchor="middle" fill="#9FB0C8" font-family="Inter,sans-serif" font-size="14" transform="rotate(-58 692 360)">risk + adherence</text>

  <circle cx="500" cy="400" r="92" fill="#5D5FEF" opacity="0.18" filter="url(#soft)"/>
  <circle cx="500" cy="400" r="82" fill="url(#core)" filter="url(#glow)">
    <animate attributeName="r" values="82;85;82" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="478" cy="378" r="17" fill="#F8F5F2"/>
  <circle cx="523" cy="383" r="14" fill="#C9B8FF"/>
  <circle cx="500" cy="418" r="16" fill="#F5A9B0"/>
  <text x="500" y="471" text-anchor="middle" fill="#fff" font-size="19" font-weight="700" letter-spacing="0.5">Ovify AI</text>
  <text x="500" y="491" text-anchor="middle" fill="#CFC7FF" font-family="Inter,sans-serif" font-size="13" letter-spacing="0.5">adherence · emotion · sync</text>

  <g>
    <circle cx="500" cy="192" r="62" fill="#1A2942" stroke="#8BD4FF" stroke-width="2.5"/>
    <g transform="translate(500,192)" fill="#8BD4FF">
      <rect x="-17" y="-16" width="34" height="34" rx="3"/>
      <rect x="-2.5" y="-11" width="5" height="14" fill="#1A2942"/>
      <rect x="-7" y="-6.5" width="14" height="5" fill="#1A2942"/>
      <rect x="-11" y="8" width="7" height="10" fill="#1A2942"/>
      <rect x="4" y="8" width="7" height="10" fill="#1A2942"/>
    </g>
    <text x="500" y="280" text-anchor="middle" fill="#F4F6FB" font-size="20" font-weight="700">Clinic</text>
    <text x="500" y="301" text-anchor="middle" fill="#9FB0C8" font-family="Inter,sans-serif" font-size="14">Clinician portal &amp; dashboard</text>
  </g>

  <g>
    <circle cx="258" cy="510" r="62" fill="#1A2942" stroke="#F5C6CF" stroke-width="2.5"/>
    <g transform="translate(258,510)" fill="#F5C6CF">
      <circle cx="0" cy="-11" r="8.5"/>
      <path d="M-15,18 V13 a15,15 0 0 1 30,0 V18 Z"/>
    </g>
    <text x="258" y="602" text-anchor="middle" fill="#F4F6FB" font-size="20" font-weight="700">Patient</text>
    <text x="258" y="623" text-anchor="middle" fill="#9FB0C8" font-family="Inter,sans-serif" font-size="14">Companion app &amp; CalmSeed</text>
  </g>

  <g>
    <circle cx="742" cy="510" r="62" fill="#1A2942" stroke="#B8A4FF" stroke-width="2.5"/>
    <g transform="translate(742,510)">
      <circle cx="-11" cy="-9" r="7" fill="#9483D9"/>
      <path d="M-23,17 V13 a12,12 0 0 1 24,0 V17 Z" fill="#9483D9"/>
      <circle cx="9" cy="-7" r="7.5" fill="#B8A4FF"/>
      <path d="M-4,18 V13 a13,13 0 0 1 26,0 V18 Z" fill="#B8A4FF"/>
    </g>
    <text x="742" y="602" text-anchor="middle" fill="#F4F6FB" font-size="20" font-weight="700">Support</text>
    <text x="742" y="623" text-anchor="middle" fill="#9FB0C8" font-family="Inter,sans-serif" font-size="14">Partner &amp; support network</text>
  </g>

  <text x="500" y="678" text-anchor="middle" fill="#C8B58B" font-family="Inter,sans-serif" font-size="15" letter-spacing="1.5">FERTILITY + INTELLIGENCE, IN SYNC</text>
</svg>
