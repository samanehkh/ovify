<text x="1328" y="344" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#78350F" text-anchor="start">L4 · Swarm</text>
<text x="1328" y="365" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" font-weight="400" fill="#78350F" text-anchor="start">expert roles collaborate</text>
<text x="50" y="430" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="400" fill="#64748B" text-anchor="start">↑ higher = more capable, more cost, less predictable.  Ovify SDLC = L4 swarm; each node kept as low as possible.</text>
<text x="50" y="478" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#13233C" text-anchor="start">GUARDRAILS — DEFENSE IN DEPTH</text>
