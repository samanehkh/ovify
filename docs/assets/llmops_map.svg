<text x="50" y="52" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" font-weight="800" fill="#13233C" text-anchor="start">LLMOps and Agentic AI — The Map</text>
<text x="50" y="80" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="400" fill="#64748B" text-anchor="start">The model is the easy part. Value + safety live in Context, Constraints, Measurement, and Visibility.</text>
<text x="50" y="128" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#13233C" text-anchor="start">THE THREE PILLARS OF LLMOps</text>
