<text x="64" y="169" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#1E3A8A" text-anchor="start">1 · EVALUATION</text>
<text x="64" y="190" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" font-weight="400" fill="#1E3A8A" text-anchor="start">How you replace 'assert ==' for non-deterministic output.</text>
<text x="64" y="225" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#1E3A8A" text-anchor="start">eval sets · LLM-as-judge · Ragas · promptfoo</text>
<rect x="585" y="145" width="510" height="110" rx="14" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
<text x="599" y="169" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#7F1D1D" text-anchor="start">2 · GUARDRAILS</text>
<text x="599" y="190" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" font-weight="400" fill="#7F1D1D" text-anchor="start">Deterministic checks wrapped around a stochastic core.</text>
<text x="599" y="225" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#7F1D1D" text-anchor="start">input · output · action layers (defense in depth)</text>
<rect x="1120" y="145" width="510" height="110" rx="14" fill="#F3E8FF" stroke="#9333EA" stroke-width="2"/>
<text x="1134" y="169" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#581C87" text-anchor="start">3 · OBSERVABILITY</text>
<text x="1134" y="190" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" font-weight="400" fill="#581C87" text-anchor="start">See every call, token, cost, and error.</text>
<text x="1134" y="225" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#581C87" text-anchor="start">traces · spans · Langfuse · OpenTelemetry</text>
<text x="50" y="300" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#13233C" text-anchor="start">THE AGENTIC LADDER  (climb only as high as the task needs)</text>
