<text x="50" y="778" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#13233C" text-anchor="start">COST LEVERS (in order of impact)</text>
<rect x="50" y="790" width="760" height="180" rx="14" fill="#F0FDF4" stroke="#16A34A" stroke-width="2"/>
<text x="64" y="820" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#14532D" text-anchor="start">• 1 · Model routing (cheap-first, escalate rarely)</text>
<text x="64" y="845" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#14532D" text-anchor="start">• 2 · Minimise context (input = most of the bill)</text>
<text x="64" y="870" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#14532D" text-anchor="start">• 3 · Prompt caching (stable prefixes)</text>
<text x="64" y="895" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#14532D" text-anchor="start">• 4 · Cap loops + per-run budget abort</text>
<text x="64" y="920" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#14532D" text-anchor="start">• 5 · Batch / fewer calls</text>
<text x="64" y="945" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#14532D" text-anchor="start">• 6 · Self-host open-weight at volume</text>
<text x="850" y="778" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#13233C" text-anchor="start">BUILD DECISION  (prompt → RAG → fine-tune)</text>
<rect x="850" y="790" width="780" height="180" rx="14" fill="#FFFBEB" stroke="#D97706" stroke-width="2"/>
<text x="864" y="820" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#78350F" text-anchor="start">Need private/fresh facts?  →  RAG</text>
<text x="864" y="850" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#78350F" text-anchor="start">Need a new skill/style instructions can't give?  →  Fine-tune (last resort)</text>
<text x="864" y="880" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#78350F" text-anchor="start">Otherwise  →  Prompt engineering (start here: free, instant)</text>
<text x="864" y="918" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="400" fill="#92400E" text-anchor="start">For knowledge: RAG beats fine-tuning — cheaper, updatable, citable.</text>
<text x="864" y="940" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#92400E" text-anchor="start">Don't use an agent where a chain will do.</text>
<text x="50" y="1010" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="800" fill="#7F1D1D" text-anchor="start">TOP 2 AGENTIC RISKS (OWASP LLM):</text>
<text x="360" y="1010" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="400" fill="#7F1D1D" text-anchor="start">LLM01 Prompt Injection  ·  LLM08 Excessive Agency  →  contained by least-privilege tools + human gates + no auto-merge/deploy.</text>
<text x="50" y="1050" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#475569" text-anchor="start">Pillars + ladder + guardrails + RAG + cost discipline = LLMOps. See llmops_deep_dive.md for the full guide.</text>
